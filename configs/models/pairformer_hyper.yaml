class_path: combinatorics.models.general.pair_hyper.PairHyperModel
init_args:
  lightning_config:
    optimizer_class: torch.optim.AdamW
    optimizer_kwargs:
      lr: 0.001
      betas:
        - 0.9
        - 0.95
      weight_decay: 0.01
    scheduler_class: combinatorics.utils.LinearWarmupCosineDecay
    scheduler_kwargs:
      warmup_steps: 20000
      total_steps: 800000
    scheduler_config:
      interval: step
      frequency: 1
